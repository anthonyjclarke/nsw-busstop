<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSW BusStop Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(7, 89, 133, 0.25), transparent 28%),
        linear-gradient(135deg, #09131b, #18364d);
      color: #f2f6fb;
      padding: 24px;
    }
    main {
      width: min(420px, 100%);
      background: rgba(10, 18, 26, 0.88);
      border: 1px solid rgba(122, 162, 190, 0.28);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 18px; color: #9ab3c6; }
    label { display: block; margin: 0 0 8px; color: #d3deea; }
    input {
      width: 100%;
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #36536b;
      background: #0f1b25;
      color: #fff;
    }
    button {
      width: 100%;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      background: #ff8a00;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin: 0 0 12px;
      color: #ffb3a7;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>NSW BusStop</h1>
    <p>Sign in to manage departures, stops, and future display clients.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
  </main>
</body>
</html>
