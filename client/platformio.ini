[env:cyd]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
board_build.partitions = partitions_custom.csv

lib_deps =
    bodmer/TFT_eSPI@^2.4.76
    tzapu/WiFiManager
    ropg/ezTime
    bblanchon/ArduinoJson@^6.21.0
    me-no-dev/ESP Async WebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    ayushsharma22/ElegantOTA@^2.2.9

build_flags =
    ; --- TFT_eSPI CYD config ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTOUCH_CS=33
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; --- Debug ---
    -DDEBUG_LEVEL=3
    -DCORE_DEBUG_LEVEL=0
